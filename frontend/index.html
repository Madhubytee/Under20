<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under20 — Quick Recipe Finder</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Under20</h1>
    <p class="tagline">Recipes in 20 minutes or less</p>
  </header>

  <main>
    <!-- Search Panel -->
    <section class="panel" id="search-panel">
      <h2>What's in your pantry?</h2>
      <div class="input-row">
        <input
          type="text"
          id="ingredient-input"
          placeholder="e.g. pasta, butter, garlic"
          autocomplete="off"
        />
        <button id="add-btn">Add</button>
      </div>

      <!-- Filters -->
      <div class="filters">
        <label>
          Max calories:
          <input type="number" id="filter-calories" placeholder="e.g. 500" min="0" />
        </label>
        <label>
          Max cook time (min):
          <input type="number" id="filter-time" placeholder="20" min="1" max="20" />
        </label>
        <label>
          Difficulty:
          <select id="filter-difficulty">
            <option value="">Any</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
          </select>
        </label>
      </div>

      <!-- Pantry chips -->
      <div id="pantry-chips" class="chip-container"></div>

      <div class="action-row">
        <button id="search-btn" class="primary-btn">Find Recipes</button>
        <button id="clear-btn" class="ghost-btn">Clear All</button>
      </div>
    </section>

    <!-- Results -->
    <section class="panel" id="results-panel" style="display:none">
      <h2>Matched Recipes <span id="match-count"></span></h2>
      <div id="results-grid" class="recipe-grid"></div>

      <div id="suggestions-section" style="display:none">
        <h3>Almost there — missing just a few ingredients</h3>
        <div id="suggestions-grid" class="recipe-grid suggestions"></div>
      </div>
    </section>
  </main>

  <!-- Recipe Card Modal -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div id="modal" class="modal">
      <button id="modal-close">×</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
